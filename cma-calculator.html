<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CMA Calc">
<title>CMA Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #010f08; font-family: 'Courier New', monospace; color: #e2e8f0; }
  input[type=range] { width: 100%; accent-color: #15803d; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const CAPE_ZONES = {
  S: { label: "Steal",     target: 0,  floor: 0,  ceiling: 0  },
  C: { label: "Cheap",     target: 0,  floor: 0,  ceiling: 5  },
  F: { label: "Fair",      target: 10, floor: 5,  ceiling: 15 },
  L: { label: "Elevated",  target: 20, floor: 15, ceiling: 25 },
  E: { label: "Expensive", target: 30, floor: 25, ceiling: 35 },
  X: { label: "Extreme",   target: 40, floor: 35, ceiling: 45 },
};

const TREND_SCORES = { "1": -1, "5": 0, "9": 1 };
const FLAG_SCORES  = { "1": -1, "5": 0, "9": 1 };
const TREND_LABELS = { "1": "Bearish", "5": "Neutral", "9": "Bullish" };
const FLAG_LABELS  = { "1": "Sell",    "5": "Neutral", "9": "Buy" };

function getAction(score, flagLabel) {
  const exCode = score + "-" + flagLabel;
  const exceptions = {
    "-2-Sell": "Maintain split + sell 5%",
    "3-Buy":   "Maintain split + deploy 10%",
  };
  if (exceptions[exCode]) return exceptions[exCode];
  const actions = {
    "-4": "100% SPAXX + sell 5%",
    "-3": "50/50 + sell 5%",
    "-2": "100% SPAXX + do nothing",
    "-1": "50/50 + do nothing",
     "0": "Maintain split + do nothing",
     "1": "100% VOO + do nothing",
     "2": "Maintain split + deploy 5%",
     "3": "100% VOO + deploy 5%",
     "4": "100% VOO + deploy 10%",
  };
  return actions[String(score)] || "Unknown";
}

function parseCode(scenarioCode) {
  if (!scenarioCode || scenarioCode.length !== 3) return null;
  const capeCode  = scenarioCode[0].toUpperCase();
  const trendCode = scenarioCode[1];
  const flagCode  = scenarioCode[2];
  if (CAPE_ZONES[capeCode] === undefined) return null;
  if (TREND_SCORES[trendCode] === undefined) return null;
  if (FLAG_SCORES[flagCode] === undefined) return null;
  return { capeCode, trendCode, flagCode };
}

const ACTION_COLORS = {
  "100% SPAXX": "#ef4444",
  "50/50":      "#f97316",
  "Maintain":   "#fbbf24",
  "100% VOO":   "#22c55e",
};

function getActionColor(action) {
  for (const [k, v] of Object.entries(ACTION_COLORS)) {
    if (action.startsWith(k)) return v;
  }
  return "#94a3b8";
}

function App() {
  const [scenarioCode, setScenarioCode] = React.useState("");
  const [voo,          setVoo]          = React.useState("");
  const [spaxx,        setSpaxx]        = React.useState("");
  const [floor,        setFloor]        = React.useState(50);
  const [weekly,       setWeekly]       = React.useState(40);

  const result = React.useMemo(() => {
    const parsed = parseCode(scenarioCode);
    if (!parsed) return null;
    const vooNum   = parseFloat(voo);
    const spaxxNum = parseFloat(spaxx);
    if (isNaN(vooNum) || isNaN(spaxxNum)) return null;

    const { capeCode, trendCode, flagCode } = parsed;
    const zone       = CAPE_ZONES[capeCode];
    const trendScore = TREND_SCORES[trendCode];
    const flagScore  = FLAG_SCORES[flagCode];
    const flagLabel  = FLAG_LABELS[flagCode];
    const trendLabel = TREND_LABELS[trendCode];

    const deployable      = Math.max(0, spaxxNum - floor);
    const activePortfolio = vooNum + deployable;
    const cashPoolPct     = activePortfolio > 0 ? (deployable / activePortfolio) * 100 : 0;

    let fundingLabel, fundingScore;
    if (cashPoolPct < zone.floor) {
      fundingLabel = "Underfunded"; fundingScore = -2;
    } else if (cashPoolPct > zone.ceiling) {
      fundingLabel = "Overfunded";  fundingScore = 2;
    } else {
      fundingLabel = "Funded";      fundingScore = 0;
    }

    const score  = Math.max(-4, Math.min(4, fundingScore + trendScore + flagScore));
    const action = getAction(score, flagLabel);
    const color  = getActionColor(action);

    const maintainSpaxxPct = zone.target / 100;
    let vooContrib, spaxxContrib;
    if (action.startsWith("100% SPAXX")) {
      vooContrib = 0; spaxxContrib = weekly;
    } else if (action.startsWith("50/50")) {
      vooContrib = weekly / 2; spaxxContrib = weekly / 2;
    } else if (action.startsWith("Maintain")) {
      spaxxContrib = weekly * maintainSpaxxPct;
      vooContrib   = weekly - spaxxContrib;
    } else {
      vooContrib = weekly; spaxxContrib = 0;
    }

    let balanceAmount = 0, balanceDir = null;
    if (action.includes("sell 5%")) {
      balanceAmount = activePortfolio * 0.05; balanceDir = "sell";
    } else if (action.includes("deploy 5%")) {
      balanceAmount = activePortfolio * 0.05; balanceDir = "buy";
    } else if (action.includes("deploy 10%")) {
      balanceAmount = activePortfolio * 0.10; balanceDir = "buy";
    }

    return {
      zone, trendLabel, flagLabel,
      deployable, activePortfolio, cashPoolPct,
      fundingLabel, score, action, color,
      vooContrib, spaxxContrib,
      balanceAmount, balanceDir,
    };
  }, [scenarioCode, voo, spaxx, floor, weekly]);

  const inp = {
    background: "#0a1a0f",
    border: "1px solid #1a3d28",
    borderRadius: "6px",
    color: "#e2e8f0",
    padding: "10px 14px",
    fontSize: "16px",
    width: "100%",
    outline: "none",
    fontFamily: "inherit",
  };

  const lbl = {
    fontSize: "10px",
    fontWeight: "700",
    letterSpacing: "0.1em",
    textTransform: "uppercase",
    color: "#64748b",
    marginBottom: "6px",
    display: "block",
  };

  const hint = {
    fontSize: "9px",
    color: "#2d4a38",
    marginTop: "6px",
    lineHeight: "1.6",
  };

  const parsed = parseCode(scenarioCode);

  return (
    <div style={{ minHeight: "100vh", background: "#010f08", padding: "24px 20px", fontFamily: "'Courier New', monospace", color: "#e2e8f0" }}>
      <div style={{ maxWidth: "480px", margin: "0 auto" }}>

        <div style={{ marginBottom: "28px" }}>
          <div style={{ fontSize: "10px", letterSpacing: "0.2em", color: "#15803d", textTransform: "uppercase", marginBottom: "6px" }}>CMA BALANCE CALCULATOR</div>
          <div style={{ fontSize: "22px", fontWeight: "700", color: "#f8fafc", lineHeight: 1.2 }}>What do I do this month?</div>
        </div>

        <div style={{ background: "#061510", border: "1px solid #1a3d28", borderRadius: "12px", padding: "20px", marginBottom: "16px" }}>
          <div style={{ fontSize: "10px", letterSpacing: "0.15em", color: "#2d4a38", textTransform: "uppercase", marginBottom: "18px" }}>INPUTS</div>

          <div style={{ marginBottom: "14px" }}>
            <label style={lbl}>Scenario Code</label>
            <input style={{ ...inp, fontSize: "24px", letterSpacing: "0.3em" }}
              placeholder="" value={scenarioCode} maxLength={3}
              onChange={e => setScenarioCode(e.target.value.toUpperCase())} />
            {scenarioCode.length === 3 && !parsed && (
              <div style={{ fontSize: "10px", color: "#ef4444", marginTop: "4px" }}>Invalid — letter: S C F L E X, digits: 1 5 9</div>
            )}
            {scenarioCode.length === 3 && parsed && (
              <div style={{ fontSize: "10px", color: "#64748b", marginTop: "4px" }}>
                {CAPE_ZONES[parsed.capeCode].label} / {TREND_LABELS[parsed.trendCode]} / {FLAG_LABELS[parsed.flagCode]}
              </div>
            )}
            {scenarioCode.length < 3 && (
              <div style={hint}>
                <div>1st: CAPE zone — S=Steal C=Cheap F=Fair L=Elevated E=Expensive X=Extreme</div>
                <div>2nd: Trend — 1=Bearish 5=Neutral 9=Bullish</div>
                <div>3rd: Flag — 1=Sell 5=Neutral 9=Buy</div>
              </div>
            )}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "14px" }}>
            <div>
              <label style={lbl}>VOO Balance ($)</label>
              <input style={inp} type="number" placeholder="0" value={voo} onChange={e => setVoo(e.target.value)} />
            </div>
            <div>
              <label style={lbl}>SPAXX Balance ($)</label>
              <input style={inp} type="number" placeholder="0" value={spaxx} onChange={e => setSpaxx(e.target.value)} />
            </div>
          </div>

          <div style={{ marginBottom: "14px" }}>
            <label style={lbl}>SPAXX Floor: <span style={{ color: "#94a3b8" }}>${floor}</span></label>
            <input type="range" min="10" max="500" step="5" value={floor}
              onChange={e => setFloor(Number(e.target.value))} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: "9px", color: "#2d4a38" }}>
              <span>$10</span><span>$500</span>
            </div>
          </div>

          <div>
            <label style={lbl}>Weekly Contribution ($)</label>
            <input style={inp} type="number" placeholder="40" value={weekly}
              onChange={e => setWeekly(Number(e.target.value))} />
          </div>
        </div>

        {result ? (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "8px", marginBottom: "12px" }}>
              {[
                { label: "CAPE Zone",   value: result.zone.label,   sub: "Target " + result.zone.target + "%", color: "#94a3b8" },
                { label: "Pool Status", value: result.fundingLabel, sub: result.cashPoolPct.toFixed(1) + "%",
                  color: result.fundingLabel === "Funded" ? "#22c55e" : result.fundingLabel === "Underfunded" ? "#ef4444" : "#f97316" },
                { label: "Score", value: (result.score >= 0 ? "+" : "") + result.score,
                  sub: result.trendLabel + " / " + result.flagLabel, color: "#94a3b8" },
              ].map(s => (
                <div key={s.label} style={{ background: "#061510", border: "1px solid #1a3d28", borderRadius: "8px", padding: "10px" }}>
                  <div style={{ fontSize: "9px", letterSpacing: "0.1em", color: "#3d5c48", textTransform: "uppercase", marginBottom: "4px" }}>{s.label}</div>
                  <div style={{ fontSize: "13px", fontWeight: "700", color: s.color }}>{s.value}</div>
                  <div style={{ fontSize: "9px", color: "#3d5c48", marginTop: "2px" }}>{s.sub}</div>
                </div>
              ))}
            </div>

            <div style={{ background: "#061510", border: "1px solid " + result.color + "50", borderRadius: "12px", padding: "18px", marginBottom: "12px" }}>
              <div style={{ fontSize: "9px", letterSpacing: "0.15em", color: result.color, textTransform: "uppercase", marginBottom: "8px" }}>ACTION</div>
              <div style={{ fontSize: "15px", fontWeight: "700", color: "#f8fafc", marginBottom: "14px" }}>{result.action}</div>

              <div style={{ background: "#010f08", borderRadius: "6px", padding: "12px", marginBottom: "10px" }}>
                <div style={{ fontSize: "9px", letterSpacing: "0.1em", color: "#3d5c48", textTransform: "uppercase", marginBottom: "8px" }}>Weekly ${weekly} split</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" }}>
                  <div>
                    <div style={{ fontSize: "9px", color: "#2d4a38", marginBottom: "2px" }}>VOO</div>
                    <div style={{ fontSize: "20px", fontWeight: "700", color: "#22c55e" }}>${result.vooContrib.toFixed(2)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: "9px", color: "#2d4a38", marginBottom: "2px" }}>SPAXX</div>
                    <div style={{ fontSize: "20px", fontWeight: "700", color: "#fbbf24" }}>${result.spaxxContrib.toFixed(2)}</div>
                  </div>
                </div>
              </div>

              <div style={{ background: "#010f08", borderRadius: "6px", padding: "12px" }}>
                <div style={{ fontSize: "9px", letterSpacing: "0.1em", color: "#3d5c48", textTransform: "uppercase", marginBottom: "6px" }}>Balance action</div>
                {result.balanceDir ? (
                  <div style={{ fontSize: "13px", color: result.balanceDir === "sell" ? "#ef4444" : "#22c55e" }}>
                    {result.balanceDir === "sell"
                      ? "Sell $" + result.balanceAmount.toFixed(2) + " of VOO to SPAXX"
                      : "Deploy $" + result.balanceAmount.toFixed(2) + " from SPAXX to VOO"}
                  </div>
                ) : (
                  <div style={{ fontSize: "13px", color: "#3d5c48" }}>No balance action this month</div>
                )}
              </div>
            </div>

            <div style={{ background: "#061510", border: "1px solid #1a3d28", borderRadius: "8px", padding: "12px", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "10px" }}>
              {[
                { label: "Active Portfolio", value: "$" + result.activePortfolio.toFixed(2) },
                { label: "Deployable SPAXX", value: "$" + result.deployable.toFixed(2) },
                { label: "Cash Pool",        value: result.cashPoolPct.toFixed(1) + "%" },
              ].map(s => (
                <div key={s.label}>
                  <div style={{ fontSize: "9px", letterSpacing: "0.1em", color: "#2d4a38", textTransform: "uppercase", marginBottom: "3px" }}>{s.label}</div>
                  <div style={{ fontSize: "12px", fontWeight: "600", color: "#cbd5e1" }}>{s.value}</div>
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div style={{ background: "#061510", border: "1px solid #1a3d28", borderRadius: "12px", padding: "32px", textAlign: "center", color: "#2d4a38", fontSize: "13px" }}>
            Enter your scenario code and balances above
          </div>
        )}

        <div style={{ marginTop: "20px", fontSize: "10px", color: "#1a3d28", textAlign: "center" }}>
          SCFLEX 159 / CMA PRISM SYSTEM
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
