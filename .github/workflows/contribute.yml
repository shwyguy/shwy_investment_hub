name: Weekly Contribution

on:
  schedule:
    - cron: '00 15 * * 1'  # Every Tuesday at 10:30am ET
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  contribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5

        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install alpaca-py requests yfinance pandas numpy exchange-calendars pytz
      - name: Run contribution script
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          PUBLIC_SECRET_KEY: ${{ secrets.PUBLIC_SECRET_KEY }}
          PUBLIC_ACCOUNT_ID: ${{ secrets.PUBLIC_ACCOUNT_ID }}
        run: python taxable_contribute.py --broker alpaca --dry-run
